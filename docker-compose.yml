services:
  # Docker socket proxy — limits API access to only what's needed for sandbox
  # See https://github.com/Tecnativa/docker-socket-proxy
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.2
    restart: unless-stopped
    privileged: true
    environment:
      CONTAINERS: 1        # Allow create/start/stop containers
      IMAGES: 1            # Allow pulling ollama/ollama image for fleet
      NETWORKS: 0
      VOLUMES: 0           # H5: Disabled — prevents host filesystem escape via volume creation
      INFO: 1              # 2026-04-25: enable /info so the LLM registry scanner can read
                           # the HOST's total RAM (vs the container's cgroup limit) when
                           # auto-detecting safe-to-pull model sizes. Read-only endpoint.
      POST: 1              # Allow POST (create/run)
      AUTH: 0
      SECRETS: 0
      SWARM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    tmpfs:
      - /run

  gateway:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - '127.0.0.1:${GATEWAY_PORT}:${GATEWAY_PORT}'
    environment:
      DOCKER_HOST: tcp://docker-proxy:2375
      # Redirect CrewAI's SQLite long-term memory into the writable workspace
      # volume so it persists across restarts and survives read_only rootfs.
      CREWAI_STORAGE_DIR: /app/workspace/crewai_storage
      # Firecrawl self-hosted instance (via shared Docker network)
      FIRECRAWL_API_URL: http://firecrawl-api:3002
      # Composio SaaS integrations
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY}
      # Smithery MCP server registry (for auto-discovery of remote MCP servers)
      SMITHERY_API_KEY: ${SMITHERY_API_KEY:-}
      # ── Paid B2B / LinkedIn data adapters (optional) ──────────────────
      # When set, the research_orchestrator's source_priority chain
      # automatically includes the matching adapter:
      #
      #   APOLLO_API_KEY     → unlocks the `apollo` adapter (Apollo.io REST).
      #                        Provides head_of_sales name + title +
      #                        LinkedIn URL + (tier-dependent) work email.
      #                        ~$59/mo basic plan. Get key at
      #                        https://apollo.io/settings/api.
      #   PROXYCURL_API_KEY  → unlocks the `linkedin_data` adapter.
      #                        Provides personal LinkedIn URLs without
      #                        scraping. ~$0.01-$0.03 per lookup. Get key
      #                        at https://nubela.co/proxycurl.
      #
      # Without these keys the adapters degrade silently to free fallbacks
      # (Brave structural search) — partial coverage but no crash.
      # Restart `docker compose up -d gateway` after changing .env.
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      PROXYCURL_API_KEY: ${PROXYCURL_API_KEY:-}
      # ── Capability Recovery Loop ───────────────────────────────────
      # When the final answer looks like "I cannot…", the system tries
      # alternative routes (re_route → other crew, escalate_tier →
      # premium model, sandbox_execute → run extracted code, direct_tool
      # → bypass LLM, skill_chain → invoke matching skill) before
      # delivering. Off by default; flip to true once verified.
      # See app/recovery/ for design.
      RECOVERY_LOOP_ENABLED: ${RECOVERY_LOOP_ENABLED:-false}
      RECOVERY_DETECTION_THRESHOLD: ${RECOVERY_DETECTION_THRESHOLD:-0.80}
      RECOVERY_MAX_ATTEMPTS: ${RECOVERY_MAX_ATTEMPTS:-2}
      RECOVERY_BUDGET_SECONDS: ${RECOVERY_BUDGET_SECONDS:-90}
      # Host RAM in GB — used by app/llm_registry_scanner to compute the
      # safe-to-pull model size cap. On Docker-Desktop-for-Mac the
      # container's view of /proc/meminfo and Docker /info both return
      # the VM's slice (e.g. 23.4 GB for a 48 GB host), which would
      # mis-budget Ollama (Ollama runs on the host, not inside the VM).
      # Run `python3 scripts/sync_host_capacity.py` to auto-detect and
      # write these into .env (idempotent, runs once at install too).
      HOST_TOTAL_RAM_GB: ${HOST_TOTAL_RAM_GB:-}
      HOST_OS_BASELINE_GB: ${HOST_OS_BASELINE_GB:-}
      # Git safe.directory for workspace backup (volume has different ownership)
      GIT_CONFIG_COUNT: '1'
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /app/workspace
      # DB backup split (2026-05-16, Option C). The gateway only runs
      # the chromadb step; pg + neo4j are handled by the host launchd
      # LaunchAgent installed via scripts/install_db_backup.sh. The
      # docker-proxy doesn't expose /exec/.../start (no EXEC: 1 flag),
      # so attempting pg_dump/neo4j-admin from inside the gateway
      # returns 403. See app/healing/db_backup.py docstring.
      DB_BACKUP_HOST_MANAGED: ${DB_BACKUP_HOST_MANAGED:-1}
    volumes:
      - ./workspace:/app/workspace
      - ./wiki:/app/wiki
      # Signal socket mount disabled — forwarder.py runs on host and bridges via HTTP
      # - ${SIGNAL_SOCKET_PATH}:${SIGNAL_SOCKET_PATH}
      - ${SIGNAL_ATTACHMENT_PATH:-/dev/null}:/app/attachments:ro
      # Service-account credentials (read-only). Mounted as a directory
      # so multiple credential files (GEE, future GCP services) can
      # share the same path without per-secret bind lines. Files inside
      # are gitignored — see .gitignore "secrets/" rule.
      - ./secrets:/app/secrets:ro
      # Firebase service-account mount retired — observability migrated to
      # Postgres (observability_snapshots) + /api/cp/* endpoints.
      # Set FIREBASE_ENABLED=1 and restore this line to re-enable Firestore.
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    networks:
      - external
      - internal
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8g
        reservations:
          cpus: '2.0'
          memory: 4g
    # read_only removed — needed for code self-modification (auto_deployer).
    # Security still enforced by: no-new-privileges, non-root user, sandbox isolation,
    # AST validation of deployed code, blocked dangerous imports, user approval gate.
    tmpfs:
      - /tmp
      - /run
      - /home/appuser/.local:uid=1000,gid=1000
      - /home/appuser/.cache:uid=1000,gid=1000
      - /home/appuser/.mem0:uid=1000,gid=1000

  chromadb:
    # Override-able via CHROMA_IMAGE (see postgres comment above).
    image: ${CHROMA_IMAGE:-chromadb/chroma:0.5.23}
    restart: unless-stopped
    volumes:
      - ./workspace/memory:/chroma/chroma
    networks:
      - internal
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    # NOT exposed to host — internal only
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "curl -sf http://localhost:8000/api/v1/heartbeat || curl -sf http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3g

  # ── Mem0 persistent memory infrastructure ───────────────────────
  # pgvector for vector storage, Neo4j for entity relationship graph.
  # Both internal-only (no internet, no host ports).
  postgres:
    # The default tag matches the live stack baseline. Operators can
    # override via env var (used by deploy/scripts/version-upgrade-drill.sh
    # to drill the forward-version-migration path against a newer image
    # without touching the live stack baseline).
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    restart: unless-stopped
    shm_size: '1gb'
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=64MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - effective_cache_size=2GB
      - -c
      - max_connections=100
    environment:
      POSTGRES_USER: mem0
      POSTGRES_PASSWORD: ${MEM0_POSTGRES_PASSWORD:?MEM0_POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: mem0
    volumes:
      - ./workspace/mem0_pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem0 -d mem0"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'

  neo4j:
    # Override-able via NEO4J_IMAGE (see postgres comment above).
    image: ${NEO4J_IMAGE:-neo4j:5-community}
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${MEM0_NEO4J_PASSWORD:?MEM0_NEO4J_PASSWORD must be set in .env}
      NEO4J_PLUGINS: '[]'
      NEO4J_server_memory_heap_initial__size: 1g
      NEO4J_server_memory_heap_max__size: 2g
      NEO4J_server_memory_pagecache_size: 1g
      NEO4J_dbms_jvm_additional: '-XX:+UseG1GC'
    volumes:
      - ./workspace/mem0_neo4j:/data
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", 'wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4g

  # ── Signal messaging infrastructure ──────────────────────────
  # Both signal-cli and forwarder run on the HOST via launchd:
  #   com.botarmy.signal-cli       — signal-cli daemon (--http 127.0.0.1:7583)
  #   com.botarmy.signal-forwarder — polls signal-cli, forwards to gateway
  # Docker networking causes WebSocket receive failures, so host is required.
  # Forwarder forwards to http://127.0.0.1:8765/signal/inbound (gateway port).

networks:
  external:
    driver: bridge
  internal:
    driver: bridge
    internal: true   # No internet access for ChromaDB or docker-proxy

volumes: {}
