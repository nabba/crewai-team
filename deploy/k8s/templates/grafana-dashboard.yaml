{{- if .Values.monitoring.dashboards.enabled }}
# ConfigMap with the BotArmy Grafana dashboard JSON. The kube-prometheus-stack
# Grafana sidecar discovers ConfigMaps with the `grafana_dashboard=1` label
# and loads them automatically — no manual import.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "botarmy.fullname" . }}-dashboards
  labels:
    {{- include "botarmy.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  botarmy-overview.json: |-
    {{- .Files.Get "dashboards/botarmy-overview.json" | nindent 4 }}
{{- end }}
