{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "botarmy.fullname" . }}-postgres
  labels:
    {{- include "botarmy.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "botarmy.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "botarmy.name" . }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "botarmy.name" . }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          args:
            - postgres
            - -c
            - shared_buffers=512MB
            - -c
            - work_mem=64MB
            - -c
            - effective_cache_size=2GB
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: mem0
            - name: POSTGRES_DB
              value: mem0
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.envSecretName }}
                  key: MEM0_POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, mem0, -d, mem0]
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
        {{- if .Values.postgres.persistence.storageClass }}
        storageClassName: {{ .Values.postgres.persistence.storageClass }}
        {{- end }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "botarmy.fullname" . }}-postgres
  labels:
    {{- include "botarmy.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None    # headless — gives stable per-pod DNS
  ports:
    - name: pg
      port: 5432
      targetPort: pg
  selector:
    app.kubernetes.io/name: {{ include "botarmy.name" . }}
    app.kubernetes.io/component: postgres
{{- end }}
